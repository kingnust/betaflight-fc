; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; http://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = drone_proto_esp32s3_clean_bmi088_gyro

[env]
build_flags =
  -std=gnu++17
  -Wall
;  -DESPFC_DEBUG_SERIAL
;  -DESPFC_DEBUG_PIN=2 ; specify pin number (board specific)
;  -DESPFC_DEV_PRESET_MODES
;  -DESPFC_DEV_PRESET_BLACKBOX_SERIAL=1 ; specify port number (board specific)
;  -DESPFC_DEV_PRESET_BLACKBOX_FLASH
;  -DESPFC_DEV_PRESET_DSHOT
;  -DESPFC_DEV_PRESET_BRUSHED
;  -DESPFC_DEV_PRESET_SCALER
;  -DNO_GLOBAL_INSTANCES
;  -DDEBUG_ESP_PORT=Serial
;  -DDEBUG_ESP_CORE
;  -DDEBUG_ESP_WIFI
;  -DDEBUG_RP2040_PORT=Serial
;  -DDEBUG_RP2040_SPI
check_tool = cppcheck
; check_tool = clangtidy
check_src_filters =
  +<src/*>
  +<lib/Espfc/src/*>
  +<lib/EscDriver/src/*>
  +<test/*>
extra_scripts = 
  bin/pio_format.py
  pre:bin/pio_patch_vl53.py
build_unflags =
  -std=gnu++11
  -ggdb

monitor_speed = 115200
upload_speed = 921600
; upload_speed = 460800
; monitor_filters = esp8266_exception_decoder
; monitor_filters = esp32_exception_decoder

lib_deps =
  yoursunny/WifiEspNow @ ^0.0.20230713
  https://github.com/rtlopez/espnow-rclink/archive/refs/tags/v0.1.1.zip
;  EspNowRcLink=symlink://../espnow-rclink

[env:esp32]
board = lolin32
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
board_build.flash_mode = qio
board_build.partitions = partitions_4M_nota.csv
lib_deps =
  ${env.lib_deps}
build_unflags =
  ${env.build_unflags}
build_flags =
  ${env.build_flags}
extra_scripts = 
  ${env.extra_scripts}
  bin/pio_merge_firmware.py

[env:esp32s3]
board = lolin_s3_mini
platform = espressif32
framework = arduino
board_build.f_cpu = 240000000L
board_build.f_flash = 80000000L
